# Stage 7: hall_door_06〜10 を parallelize で並列自動開放する。
# hall_door_01〜05 はプレイヤーが個別に開けた後にこれをデプロイする。
#
# parallelize は child_params に渡したパラメータ数だけ child_type の want を並列実行する。
# 5枚のドアを一度に開けるため、5つの rpg_try_keys want が同時に起動される。
wants:
  - metadata:
      name: open-last-hall-doors
      type: parallelize
      labels:
        recipe: Parallelize
    spec:
      params:
        child_type: rpg_try_keys
        child_params:
          - target: hall_door_06
          - target: hall_door_07
          - target: hall_door_08
          - target: hall_door_09
          - target: hall_door_10
