id: stage8
title: "The Watcher"
description: |
  観測室。センサーと機器が並ぶ静かな部屋。
  ここで何が起きているかを知るには、観測し続けるwantをデプロイする必要がある。
  rpg_observe wantをデプロイして、部屋の状態をリアルタイムで観察しよう。
initial_position: sensor_room
waypoints:
  sensor_room:
    label: "観測室"
    adjacent: []
devices:
  sensor_a:
    label: "温度センサー"
    on: true
  sensor_b:
    label: "動体センサー"
    on: false
achievement_defs:
  - id: observe_want_deployed
    when: { action: observe }
next_goal_rules:
  - if_missing: observe_want_deployed
    goal:
      text: "rpg_observe wantをデプロイして観測室の状態を観察しよう"
      hint: "mywant apply examples/stage8-observe.yaml"
cleared_when: observe_want_deployed
next_stage: stage9
narrations:
  - match: { action: observe }
    situation: |
      観測室。壁一面に計器が並んでいる。
      温度センサー（sensor_a）は稼働中、動体センサー（sensor_b）は停止している。
      この部屋で何が起きているか、wantが継続的に報告してくれる。
    lore: |
      rpg_observe は一度デプロイすると、定期的にステージの状態を取得し続ける。
      スキルやコントロールは「一回の命令」だが、
      wantは「こうあり続けてほしい」という継続的な意図——
      want cardがリアルタイムで部屋の様子を映し出すのはそのためだ。

      観測室の次には、wantを組み合わせてより複雑な問題を解く部屋が待っている。
