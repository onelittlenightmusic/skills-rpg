wantType:
  metadata:
    name: rpg_observe
    title: RPG Observe
    description: rpg-server のゲーム状態の指定 path を継続観測してキャッシュとして want に保持する。
    version: '1.0'
    category: rpg
    pattern: independent
    labels:
      child-role: monitor

  finalResultField: value

  parameters:
    - { name: target, description: 観測対象の dot-path（空 = 全状態）, type: string, required: false }

  state:
    - { name: skill_json_arg,       description: JSON arg, type: string, label: current, persistent: false, initialValue: "" }
    - { name: target,               description: target (mirror), type: string, label: current, persistent: false, initialValue: "" }
    - { name: error,                description: error, type: string, label: current, persistent: true, initialValue: "" }
    - { name: summary,              description: summary, type: string, label: current, persistent: true, initialValue: "" }
    - { name: achieving_percentage, description: 0-100, type: int, label: current, persistent: false, initialValue: 0 }
    - { name: scene,               description: scene descriptor JSON for card rendering, type: object, label: current, persistent: true, initialValue: null }

  finalizeWhen:
    failed:   { field: error, operator: "!=", value: "" }

  onInitialize:
    current:
      skill_json_arg: '{"target":"${target}"}'

  requires:
    - rpg_observe

  examples:
    - name: watch door1
      description: door1 の状態を継続観測
      want:
        metadata: { name: watch-door1, type: rpg_observe }
        spec:
          params: { target: stages.stage1.doors.door1 }
