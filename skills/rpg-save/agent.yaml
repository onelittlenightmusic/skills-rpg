agent:
  metadata:
    name: rpg_save_agent
    capability: rpg_save
    type: do
  script:
    path: ./main.py
    timeout_seconds: 15
  state_updates:
    - { name: ok,   type: bool,   label: current, persistent: true, onFetchData: "ok" }
    - { name: meta, type: object, label: current, persistent: true, onFetchData: "meta" }
