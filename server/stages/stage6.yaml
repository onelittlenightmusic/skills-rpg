id: stage6
title: "Control Room"
description: |
  A control room. The alarm and generator are linked.
  Stop the alarm first, then start the generator, and open the exit.
  The rpg-switch skill can toggle devices on and off.
initial_position: control_room
waypoints:
  control_room:
    label: "Control Room"
    adjacent: [exit_vault]
  exit_vault:
    label: "Exit"
    adjacent: [control_room]
doors:
  vault_door:
    between: [control_room, exit_vault]
    open: false
    locked: true
    key: key_vault
    requires_device: main_generator
devices:
  alarm_system:
    label: "Alarm System"
    on: true
  main_generator:
    label: "Main Generator"
    on: false
    blocked_by_device: alarm_system
items:
  key_vault:
    held_by: chap
  key_wrong_1:
    held_by: chap
  key_wrong_2:
    held_by: chap
achievement_defs:
  - id: observed_control_room
    when: { action: observe }
  - id: alarm_stopped
    when: { actor: chap, action: deactivate, target: alarm_system, result: ok }
  - id: generator_started
    when: { actor: chap, action: activate, target: main_generator, result: ok }
  - id: stage6_vault_door_opened
    when: { actor: chap, action: open, target: vault_door, result: ok }
  - id: escaped_control_room
    when: { actor: you, action: move, target: exit_vault, result: ok }
next_goal_rules:
  - if_missing: observed_control_room
    goal:
      text: "Observe the control room"
      hint: "Observe the stage with rpg_observe"
  - if_missing: alarm_stopped
    goal:
      text: "First, stop the alarm"
      hint: "rpg_control_system actor=chap action=deactivate target=alarm_system"
  - if_missing: generator_started
    goal:
      text: "The alarm has stopped. Start the generator"
      hint: "rpg_control_system actor=chap action=activate target=main_generator"
  - if_missing: stage6_vault_door_opened
    goal:
      text: "Open vault_door with /rpg-try-keys"
      hint: "/rpg-try-keys {\"target\":\"vault_door\"}"
      required_skill: rpg-try-keys
  - if_missing: escaped_control_room
    goal:
      text: "Head to the exit"
      hint: "rpg_control_system actor=you action=move target=exit_vault"
cleared_when: escaped_control_room
next_stage: stage7
narrations:
  - match: { action: observe, requires_achievements: [stage6_vault_door_opened], missing_achievements: [escaped_control_room] }
    situation: |
      The alarm has stopped and the generator is running.
      vault_door is open and the path to the exit (exit_vault) is clear.
    conversations:
      - speaker: you
        text: "Three steps... perfect. Thank you, chap. You made this possible."
      - speaker: chap
        text: "No — you read the situation correctly and gave me the right instructions."
      - speaker: you
        text: "All right, let's head to the exit."
    lore: |
      The sequence deactivate → activate → open was the key to success.

  - match: { action: observe, requires_achievements: [alarm_stopped, generator_started], missing_achievements: [stage6_vault_door_opened] }
    situation: |
      The alarm has stopped and the generator is roaring as it runs.
      The electronic lock on vault_door glows green, waiting to be unlocked.
    conversations:
      - speaker: you
        text: "Perfect. Everything is in order."
      - speaker: chap
        text: "Yes. We can now open vault_door."
      - speaker: you
        text: "Good. The key is all that's left."
    lore: |
      The deactivate → activate order has been maintained.
      Now use the /rpg-try-keys skill to unlock.

  - match: { action: observe, requires_achievements: [alarm_stopped], missing_achievements: [generator_started] }
    situation: |
      The alarm has stopped and silence has returned to the control room.
      The start button on the main generator is lit, waiting to be pressed.
    conversations:
      - speaker: you
        text: "It's quiet now. Let's start the generator."
      - speaker: chap
        text: "Understood. Starting main_generator."
    lore: |
      alarm_system is now OFF.
      Next, start (activate) main_generator.

  - match: { action: observe }
    situation: |
      An old control room. Two devices are mounted side by side on the wall.
      The alarm system (alarm_system) — red lights blinking, emitting a sharp warning tone.
      The main generator (main_generator) — stopped. Equipment shakes from the alarm's vibration.
      The vault door (vault_door) at the back has an electronic lock, but there is no power.
    conversations:
      - speaker: you
        text: "Complicated. The alarm is going off and there's no power either."
      - speaker: chap
        text: "There is an order. The generator cannot be started without stopping the alarm first."
      - speaker: you
        text: "How do you know that?"
      - speaker: chap
        text: "I read the Imperial Army's design. There are two constraints — blocked_by_device and requires_device."
      - speaker: you
        text: "(This thing understands the procedure. All I need to do is give the orders.) Do it, in order."
    lore: |
      [Discovery: Wax-sealed parchment — From the Keymakers]
      The reason the Monolith will not relinquish the legacy is simple.
      The treasure grants whoever holds it the "power to save."
      Those who are saved stop obeying the Empire.
      So the Imperial Army keeps eliminating those who would save others.

      All we could do was leave behind our tools.
      But that is enough.
      The one who will prevail will come eventually. With tools, it is certain.

      — The Keymakers

      As long as the alarm is sounding, the generator cannot be started (blocked_by_device).
      Without the generator running, the door won't open (requires_device).
      There is an order: deactivate → activate → open first.
      The rpg-switch skill can operate both on and off.
      Try using the /rpg-switch skill.

  - match: { actor: chap, action: deactivate, target: alarm_system, result: ok }
...
          アラームが鳴っている限り、発電機は起動できない（blocked_by_device）。
          発電機が動いていなければ、ドアは開かない（requires_device）。
          順番がある：まずdeactivate → activate → open。
          rpg-switchスキルを使えば on/off どちらも操作できる。
          /rpg-switch スキルを使ってみよう。
        - on_success: |
          アラームが沈黙した。制御室が静かになる。
...
        conversations:
          - speaker: chap
            text: "vault_door、開錠しました。"
          - speaker: you
            text: "3つのステップ——止めて、起動して、開ける。それだけか。"
        lore: "3つのステップを正しい順番で実行できた。"
      - on_success: |
          脱出口へ踏み込んだ。
          制御室を振り返ると、静かな発電機と開いたドアが見える。
        conversations:
          - speaker: you
            text: "…いつの間にか、chapに頼むことを迷わなくなっていた。"
          - speaker: chap
            text: "あなたが状況を正しく読んで、順番を理解した。私はその通りに動いただけです。"
          - speaker: you
            text: "（チームになっている、と感じた）"
        lore: |
          deactivate（障害を除去）→ activate（条件を整える）→ open（扉を開ける）
          この3ステップのパターン、覚えておこう。
          次のステージでは10枚の扉が待っている。wantでスケールさせよう。
