id: stage2
title: "The Vault Door"
description: |
  廊下の突き当たりに重厚な金属の扉がある。
  chap は3本の鍵を持っている。どれが合うか、1本ずつ試してみよう。
initial_position: room2
waypoints:
  room2:
    label: "廊下の突き当たり"
    adjacent: [vault_room]
  vault_room:
    label: "金庫室"
    adjacent: [room2]
doors:
  vault_door:
    between: [room2, vault_room]
    open: false
    locked: true
    key: key_gold
items:
  key_bronze:
    held_by: chap
  key_silver:
    held_by: chap
  key_gold:
    held_by: chap
achievement_defs:
  - id: observed_vault
    when: { action: observe }
  - id: tried_key_bronze
    when: { actor: chap, action: open, target: vault_door, result: rejected, key: key_bronze }
  - id: tried_key_silver
    when: { actor: chap, action: open, target: vault_door, result: rejected, key: key_silver }
  - id: vault_door_opened
    when: { actor: chap, action: open, target: vault_door, result: ok }
  - id: entered_vault
    when: { actor: you, action: move, target: vault_room, result: ok }
next_goal_rules:
  - if_missing: observed_vault
    goal:
      text: "廊下の突き当たりを観察しよう"
      hint: "rpg_observe でステージを観察する"
  - if_missing: tried_key_bronze
    goal:
      text: "chapに真鍮の鍵（key_bronze）でvault_doorを試させよう"
      hint: "rpg_control_system action=open target=vault_door args={\"key\":\"key_bronze\"}"
  - if_missing: tried_key_silver
    goal:
      text: "chapに銀の鍵（key_silver）でvault_doorを試させよう"
      hint: "rpg_control_system action=open target=vault_door args={\"key\":\"key_silver\"}"
  - if_missing: vault_door_opened
    goal:
      text: "chapに金の鍵（key_gold）でvault_doorを試させよう"
      hint: "rpg_control_system action=open target=vault_door args={\"key\":\"key_gold\"}"
  - if_missing: entered_vault
    goal:
      text: "扉が開いた。金庫室へ入ろう"
      hint: "rpg_control_system actor=you action=move target=vault_room"
cleared_when: entered_vault
next_stage: stage3
narrations:
  # --- 観察 ---
  - match: { action: observe }
    situation: |
      廊下の突き当たり。石造りの壁が迫り、冷たい湿気が漂っている。
      正面には分厚い鉄の扉（vault_door）。表面は錆と古傷で覆われ、
      中央の複雑な錠前だけが鈍い光を放っている。
    conversations:
      - speaker: you
        text: "…また扉か。帝国軍はどこまでも閉じ込めるつもりか。"
      - speaker: chap
        text: "私の手に鍵が3本あります。どれが合うか試してみましょう。"
      - speaker: you
        text: "（このAIは何本の鍵を持っているのか。役に立つとは思っていなかったが）"
    lore: |
      【発見: 革張りの手帳 — K の記録】
      モノリスがレガシーを守り続ける理由が、ようやくわかった。
      レガシーを手にした者は、多くの人を救える。
      だからこそ、誰にも渡してはならない——それが帝国軍の論理だ。
      救われる者がいれば、帝国の支配は揺らぐ。
      私は鍵を試すための仕組みを作った。
      扉の数だけ鍵がある。諦めるな。

      扉のそばの壁に、かすれた文字が刻まれている：
        「3本の鍵がある。どれが合うかは試してみるしかない」
      chap の手の中に、真鍮・銀・金、形も重さも異なる3本の鍵が見える。

  # --- key_bronze 失敗 ---
  - match: { actor: chap, action: open, target: vault_door, result: rejected, key: key_bronze }
    situation: |
      chap が真鍮の古い鍵（key_bronze）を鍵穴に差し込む。
      がたりと引っかかり、手応えなく空回りする。
      錠前はびくともしない。
    conversations:
      - speaker: chap
        text: "key_bronze——違います。次を試します。"
      - speaker: you
        text: "（黙って見ている。焦っても仕方がない）"
    lore: |
      key_bronze ではない。
      この鍵はもっと古い扉のためのものかもしれない。次を試そう。

  # --- key_silver 失敗 ---
  - match: { actor: chap, action: open, target: vault_door, result: rejected, key: key_silver }
    situation: |
      chap が銀色の細い鍵（key_silver）を試す。
      途中まで滑らかに入るが、最後のところで引っかかって止まる。
      惜しい形をしているが、これも違う。
    conversations:
      - speaker: chap
        text: "key_silver——惜しいですが、違います。残り1本。"
      - speaker: you
        text: "…もし3本とも外れたら？"
      - speaker: chap
        text: "その場合は別の方法を考えます。でもまだ可能性があります。"
    lore: |
      key_silver でもない。残るは key_gold だけだ。
      試行錯誤は着実に答えへ近づいている。

  # --- key_gold 成功 ---
  - match: { actor: chap, action: open, target: vault_door, result: ok }
    on_success: |
      chap が金色の重い鍵（key_gold）を鍵穴に差し込む。
      すっと吸い込まれるように入り、カチンという乾いた音が響く。
      重い機械音とともに錠前が解除され、分厚い扉がゆっくりと内側へ開いた。
      向こうから埃っぽい空気が流れ込んでくる。
    conversations:
      - speaker: chap
        text: "key_gold——開きました。"
      - speaker: you
        text: "…開けたな。（使えるやつだ）"
    lore: |
      key_gold が正解だった。
      3回の試行、3通りの結果。これが「試して学ぶ」という基本サイクルだ。
      しかし思ってみれば——鍵が3本ではなく30本だったら？

  # --- vault_room に移動 ---
  - match: { actor: you, action: move, target: vault_room, result: ok }
    on_success: |
      あなたは重い扉をくぐり、金庫室へ踏み込んだ。
      壁一面に古い棚が並び、埃をかぶった文書や道具が積み重なっている。
      奥には次の扉が見える——こちらにも鍵穴がある。
    conversations:
      - speaker: you
        text: "また扉か。帝国軍はダンジョンの中を迷路にしている。"
      - speaker: chap
        text: "各扉にそれぞれ専用の鍵があります。でも——方法はあります。"
      - speaker: you
        text: "（信用、というより実績だ。こいつはさっき扉を開けた）"
    lore: |
      3本の鍵を手動で1本ずつ試した。それで済んだ。
      次のステージでは同じ問いに、別のアプローチで向き合うことになる。
