id: stage6
title: "Control Room"
description: |
  制御室。アラームと発電機が連動している。
  アラームを止めてから発電機を起動し、出口を開けよう。
  rpg-switchスキルを使えば on/off を切り替えられる。
initial_position: control_room
waypoints:
  control_room:
    label: "制御室"
    adjacent: [exit_vault]
  exit_vault:
    label: "脱出口"
    adjacent: [control_room]
doors:
  vault_door:
    between: [control_room, exit_vault]
    open: false
    locked: true
    key: key_vault
    requires_device: main_generator
devices:
  alarm_system:
    label: "アラームシステム"
    on: true
  main_generator:
    label: "メイン発電機"
    on: false
    blocked_by_device: alarm_system
items:
  key_vault:
    held_by: chap
  key_wrong_1:
    held_by: chap
  key_wrong_2:
    held_by: chap
achievement_defs:
  - id: observed_control_room
    when: { action: observe }
  - id: alarm_stopped
    when: { actor: chap, action: deactivate, target: alarm_system, result: ok }
  - id: generator_started
    when: { actor: chap, action: activate, target: main_generator, result: ok }
  - id: stage6_vault_door_opened
    when: { actor: chap, action: open, target: vault_door, result: ok }
  - id: escaped_control_room
    when: { actor: you, action: move, target: exit_vault, result: ok }
next_goal_rules:
  - if_missing: observed_control_room
    goal:
      text: "制御室を観察しよう"
      hint: "rpg_observe でステージを観察する"
  - if_missing: alarm_stopped
    goal:
      text: "まずアラームを止めよう"
      hint: "rpg_control_system actor=chap action=deactivate target=alarm_system"
  - if_missing: generator_started
    goal:
      text: "アラームが止まった。発電機を起動しよう"
      hint: "rpg_control_system actor=chap action=activate target=main_generator"
  - if_missing: stage6_vault_door_opened
    goal:
      text: "vault_doorを /rpg-try-keys で開けよう"
      hint: "/rpg-try-keys {\"target\":\"vault_door\"}"
      required_skill: rpg-try-keys
  - if_missing: escaped_control_room
    goal:
      text: "脱出口へ向かおう"
      hint: "rpg_control_system actor=you action=move target=exit_vault"
cleared_when: escaped_control_room
next_stage: stage7
narrations:
  - match: { action: observe, requires_achievements: [stage6_vault_door_opened], missing_achievements: [escaped_control_room] }
    situation: |
      アラームは止まり、発電機も稼働中だ。
      vault_doorは開かれており、脱出口（exit_vault）への道が開いている。
    conversations:
      - speaker: you
        text: "3つのステップ……完璧だ。ありがとう、chap。君のおかげだ。"
      - speaker: chap
        text: "いえ、あなたが状況を正しく判断し、私に正しい指示をくれたからです。"
      - speaker: you
        text: "よし、脱出口へ行こう。"
    lore: |
      deactivate → activate → open の順番が成功の鍵だった。

  - match: { action: observe, requires_achievements: [alarm_stopped, generator_started], missing_achievements: [stage6_vault_door_opened] }
    situation: |
      アラームは止まり、発電機も轟音を立てて稼働している。
      vault_doorの電子錠も緑色に光り 、開錠を待っている。
    conversations:
      - speaker: you
        text: "完璧だ。準備は整ったな。"
      - speaker: chap
        text: "はい。これで vault_door を開けられます。"
      - speaker: you
        text: "よし、あとは鍵だ。"
    lore: |
      deactivate → activate の順序が守られた。
      あとは /rpg-try-keys スキルで開錠しよう。

  - match: { action: observe, requires_achievements: [alarm_stopped], missing_achievements: [generator_started] }
    situation: |
      アラームは止まり、制御室には静寂が戻った。
      メイン発電機の起動ボタンが点灯し、押されるのを待っている。
    conversations:
      - speaker: you
        text: "静かになった。次は発電機を起動しよう。"
      - speaker: chap
        text: "了解しました。main_generator を起動します。"
    lore: |
      alarm_system が OFF になった。
      次は main_generator を起動（activate）しよう。

  - match: { action: observe }
    situation: |
      古い制御室。二つの装置が壁に並んでいる。
      アラームシステム（alarm_system）——赤いランプが点滅し、鋭い警報音を発している。
      メイン発電機（main_generator）——停止中。アラームの振動で機器が揺れている。
      奥の金庫室ドア（vault_door）には電子錠がついているが、電源がない。
    conversations:
      - speaker: you
        text: "複雑だな。アラームが鳴っていて、電源も来ていない。"
      - speaker: chap
        text: "順番があります。アラームを止めないと発電機は動かせません。"
      - speaker: you
        text: "なぜわかる？"
      - speaker: chap
        text: "帝国軍の設計を読みました。blocked_by_device と requires_device——2つの制約がかかっています。"
      - speaker: you
        text: "（こいつは手順を理解している。指示するだけでいい）やってくれ、順番通りに。"
    lore: |
      【発見: 封蝋された羊皮紙 — キーメイカーズより】
      モノリスがレガシーを手放さない理由は、単純だ。
      財宝は、それを持つ者に「救う力」を与える。
      救われた民は、帝国に従わなくなる。
      だから帝国軍は、救う者を消し続ける。

      私たちは道具を残すことしかできなかった。
      しかしそれで十分だ。
      覇者はいつか現れる。道具があれば、必ず。

      ——キーメイカーズ一同

      アラームが鳴っている限り、発電機は起動できない（blocked_by_device）。
      発電機が動いていなければ、ドアは開かない（requires_device）。
      順番がある：まずdeactivate → activate → open。
      rpg-switchスキルを使えば on/off どちらも操作できる。
      examples/stage6-switch.yaml を mywant apply してみよう。

  - match: { actor: chap, action: deactivate, target: alarm_system, result: ok }
    on_success: |
      アラームが沈黙した。制御室が静かになる。
      メイン発電機の起動ボタンのランプが点灯した——起動可能になった。
    conversations:
      - speaker: chap
        text: "alarm_system、停止しました。main_generatorが起動可能になりました。"
      - speaker: you
        text: "次は発電機だな。"
    lore: "alarm_systemがOFFになった。これでmain_generatorを起動できる。"

  - match: { actor: chap, action: activate, target: main_generator, result: ok }
    on_success: |
      発電機が轟音と共に動き出した。
      vault_doorの電子錠が緑色に光る。
    conversations:
      - speaker: chap
        text: "main_generator、起動しました。vault_doorの電子錠が解除可能になりました。"
      - speaker: you
        text: "完璧だ。（chapは手順を完全に理解している）"
    lore: |
      deactivate → activate の順番が守られた。
      あとは vault_door に鍵を試すだけだ。

  - match: { actor: chap, action: open, target: vault_door, result: ok }
    on_success: "vault_doorが重い音を立てて開く。"
    conversations:
      - speaker: chap
        text: "vault_door、開錠しました。"
      - speaker: you
        text: "3つのステップ——止めて、起動して、開ける。それだけか。"
    lore: "3つのステップを正しい順番で実行できた。"

  - match: { actor: you, action: move, target: exit_vault, result: ok }
    on_success: |
      脱出口へ踏み込んだ。
      制御室を振り返ると、静かな発電機と開いたドアが見える。
    conversations:
      - speaker: you
        text: "…いつの間にか、chapに頼むことを迷わなくなっていた。"
      - speaker: chap
        text: "あなたが状況を正しく読んで、順番を理解した。私はその通りに動いただけです。"
      - speaker: you
        text: "（チームになっている、と感じた）"
    lore: |
      deactivate（障害を除去）→ activate（条件を整える）→ open（扉を開ける）
      この3ステップのパターン、覚えておこう。
      次のステージでは10枚の扉が待っている。wantでスケールさせよう。
