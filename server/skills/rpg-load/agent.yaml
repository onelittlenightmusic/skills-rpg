agent:
  metadata:
    name: rpg_load_agent
    capability: rpg_load
    type: do
  script:
    path: ./main.py
    timeout_seconds: 15
  state_updates:
    - { name: ok,        type: bool,   label: current, persistent: true, onFetchData: "ok" }
    - { name: slot,      type: string, label: current, persistent: true, onFetchData: "slot" }
    - { name: next_goal, type: object, label: current, persistent: true, onFetchData: "next_goal" }
