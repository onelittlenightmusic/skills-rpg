agent:
  metadata:
    name: rpg_control_agent
    capability: rpg_control
    type: do
  script:
    path: ./main.py
    timeout_seconds: 30
  state_updates:
    - { name: ok,                    type: bool,   label: current, persistent: true,  onFetchData: "ok" }
    - { name: reason,                type: string, label: current, persistent: true,  onFetchData: "reason" }
    - { name: hints,                 type: object, label: current, persistent: true,  onFetchData: "hints" }
    - { name: changes,               type: object, label: current, persistent: true,  onFetchData: "changes" }
    - { name: achievements_unlocked, type: object, label: current, persistent: true,  onFetchData: "achievements_unlocked" }
    - { name: next_goal,             type: object, label: current, persistent: true,  onFetchData: "next_goal" }
    - { name: summary,               type: string, label: current, persistent: true,  onFetchData: "reason" }
