wantType:
  metadata:
    name: rpg_control
    title: RPG Control
    description: |
      rpg-server に対してゲームアクション (open / move / pickup / observe など) を chap として実行する。
      you から拒否されたアクションを代行する用途で使う。
    version: '1.0'
    category: rpg
    pattern: independent
    labels:
      child-role: doer

  finalResultField: summary

  parameters:
    - name: action
      description: ゲームアクション名（observe / move / pickup / open など）
      type: string
      required: true
    - name: target
      description: 対象（door id / item id / waypoint id など）
      type: string
      required: false
    - name: args
      description: アクション固有の追加引数
      type: object
      required: false

  state:
    - { name: skill_json_arg,        description: JSON arg passed to main.py, type: string, label: current, persistent: false, initialValue: "" }
    - { name: action,                description: action (mirror), type: string, label: current, persistent: false, initialValue: "" }
    - { name: target,                description: target (mirror), type: string, label: current, persistent: false, initialValue: "" }
    - { name: args,                  description: args (mirror), type: object, label: current, persistent: false, initialValue: {} }
    - { name: error,                 description: error message if failed, type: string, label: current, persistent: true, initialValue: "" }
    - { name: summary,               description: summary text, type: string, label: current, persistent: true, initialValue: "" }
    - { name: achieving_percentage,  description: 0-100 progress, type: int, label: current, persistent: false, initialValue: 0 }

  finalizeWhen:
    achieved:
      field: mrs_raw_output
      operator: "!="
      value: null
    failed:
      field: error
      operator: "!="
      value: ""

  onInitialize:
    current:
      skill_json_arg: '{"action":"${action}","target":"${target}","args":${args}}'

  requires:
    - rpg_control

  examples:
    - name: ask chap to open door1
      description: chap が door1 を開ける
      want:
        metadata: { name: ask-chap-open-door1, type: rpg_control }
        spec:
          params: { action: open, target: door1 }
