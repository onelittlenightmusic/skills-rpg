agent:
  metadata:
    name: rpg_try_keys_agent
    capability: rpg_try_keys
    type: do
  script:
    path: ./main.py
    timeout_seconds: 60
  state_updates:
    - { name: ok,                    type: bool,   label: current, persistent: true,  onFetchData: "ok" }
    - { name: reason,                type: string, label: current, persistent: true,  onFetchData: "reason" }
    - { name: changes,               type: object, label: current, persistent: true,  onFetchData: "changes" }
    - { name: achievements_unlocked, type: object, label: current, persistent: true,  onFetchData: "achievements_unlocked" }
    - { name: next_goal,             type: object, label: current, persistent: true,  onFetchData: "next_goal" }
    - { name: summary,               type: string, label: current, persistent: true,  onFetchData: "summary" }
    - { name: target,                type: string, label: current, persistent: true,  onFetchData: "target" }
    - { name: tried,                 type: array,  label: current, persistent: true,  onFetchData: "tried" }
    - { name: scene,                 type: object, label: current, persistent: true,  onFetchData: "scene" }
